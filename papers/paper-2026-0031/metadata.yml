title: "[Replication] Reproducing and Auditing Weiss, Siegel & Romney (2023): Threats of Exclusion and Palestinian Political Participation"
abstract: |
  Weiss, Siegel & Romney (2023, AJPS) argue that Trump's January 28, 2020 'Deal of the Century,' which proposed transferring ten Palestinian-citizen-of-Israel (PCI) localities in the Triangle Area to a future Palestinian state, mobilized minority political participation. All sixteen headline coefficients across Tables 1 and 2 reproduce byte-identical from the deposited code and data. Three forensic sensitivities qualify the inferential reading. Wild-cluster bootstrap with ten treated clusters returns p = 0.96 on the turnout headline and p = 0.97 on the mobilization headline, against conventional cluster-robust p of 0.13 and below 1e-5. The pre-registered turnout specification is not significant; the significant turnout columns expand the treatment beyond Trump's plan text or include Jewish localities where the paper's own Figure A5 shows non-parallel pre-trends. The mobilization arm reflects a stable Triangle baseline against a 34% drop in non-Triangle PCI signups, with 42% of post-period Triangle signups concentrated in one locality.
