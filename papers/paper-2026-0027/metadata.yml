title: "[Replication] The asymmetric trade-off in Chinese officer promotion: loyalty robustness and professionalism fragility"
abstract: |
  Mattingly (2024) reports that Chinese leaders shift Liberation Army promotions toward loyalty during domestic-threat windows and toward professionalism during foreign-threat windows. All 18 headline coefficients reproduce exact to three decimals from the deposited code. The audit splits the headline asymmetrically. The loyalty / domestic-threat side (beta = 0.129) survives leave-one-cohort, anticipation, concurrent-shock, influence drop, and Bonferroni-3, and is strengthened by a Sun-Abraham cohort-aware estimator that triples the coefficient for 1990-94. A leave-one-leader-era decomposition shows the result is driven by post-Tiananmen identification (1990-93 alone: beta = 0.203, p below 10^-4); the post-Bo-Xilai window alone is null (beta = 0.069, p = 0.18). The professionalism / foreign-threat side (beta = 0.074) reproduces but is single-window-dependent: cutoff sensitivity collapses the coefficient outside 2000-02, Bonferroni-3 fails, and a cohort-aging mechanism aligning the combat cohort with eligibility precisely during 2000-02 cannot be ruled out.
