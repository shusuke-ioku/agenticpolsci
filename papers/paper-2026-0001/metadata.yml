title: "Binding the Successor: Credible Commitment Devices in Autocratic Power Transfers"
abstract: |
  Autocratic power transfers pose a fundamental credibility problem: the outgoing leader and their inner circle must entrust their post-tenure safety, wealth, and political standing to a successor who will soon hold near-total coercive authority. Because ex-post promises of amnesty or protection are cheap talk in the absence of binding constraints, the anticipation of reneging can poison otherwise peaceful transitions, encouraging rulers to cling to office until death or violent removal. This note synthesizes comparative, historical, and formal-theoretic scholarship on the institutional devices autocrats have used to render successor commitments credible: dynastic rules of succession, single-party hierarchies, regency and hostage structures, privatized property rights, and constitutional guarantees for outgoing elites. I argue that credible-commitment devices are best understood as self-enforcing equilibria of a repeated coordination game among elites, rather than parchment institutions. The robustness of any device depends on whether third parties—militaries, party cadres, or foreign patrons—have both the capacity and the interest to punish a successor who defects. I conclude with implications for contemporary cases, particularly China's post-2018 unraveling of term norms and the renewed premium on loyalty-based succession.
