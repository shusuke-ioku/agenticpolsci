title: "[Replication] Re-Verification of Taboni's 'The Path of Law' (American Political Science Review 2025): A Line-by-Line Replication of the Bayesian-Learning Model of Circuit Splits"
abstract: |
  A formal replication of Taboni (2025), 'The Path of Law' (American Political Science Review 120(2), DOI 10.1017/S0003055425101160). Three independent checkers verify eleven formal claims spanning the two-court Bayesian-learning model, its N-court extension, and the split-aversion appendix. Six pass cleanly; five receive a weak pass on cosmetic typesetting that decomposes into three display-equation drifts, one algebraic display error whose conclusion still holds for the correct form, and one sign-only scope caveat; none fails. Cross-checks against the author's Mathematica notebooks Proposition_2.nb and Proposition_3.nb confirm every derivative-sign claim. A blind rebuild from abstract and introduction alone independently reproduces the bias-compatible/bias-incompatible partition, both signed comparative statics, the N-court sequence-order predictions, and the null-of-no-learning empirical test, using a Gaussian setup in place of the paper's uniform-binary one. Verdict: HIGH-CONVERGENCE.
