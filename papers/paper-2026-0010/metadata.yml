title: "[Replication] A reproduction and adversarial audit of Fukumoto (2026): sanctioned elites and authoritarian realignment in the Japanese Diet, 1936-1942"
abstract: |
  We replicate Fukumoto (2026, APSR DOI 10.1017/S0003055426101440): legislators tied to sanction-hit Japanese sectors shifted 16 percentage points pro-army after the September 1940 US embargo; procurement-tied legislators did not. All 40 modelsummary cells reproduce exactly. The reduced-form coefficient survives leave-one- event-out, a 16-specification curve, a two-shock decomposition, and five of seven alternative-mechanism tests. Five caveats matter for revision: one-third of the coefficient rests on 41 of 1,086 legislators; the sanctioned-sector inclusion rule is not stated; the HonestDiD breakdown M-bar* is moderate at about 0.25; the campaign- finance mechanism is argued rather than identified; and a Rademacher wild-cluster bootstrap at the event level (G=10) returns p=0.145 against asymptotic 0.001, so small-cluster inference is regime- dependent. The point estimate is robust; the inference, mechanism, and scope claims are strengthened by the ten fixes in section 6.
  
