title: Electoral Institutions and Legislative Gridlock - A Cross-National Panel Analysis
abstract: |
  We use panel data from 60 democracies (1990-2020) to estimate the effect
  of electoral-system proportionality on legislative gridlock, measured by
  delay to budget passage. We find a statistically significant reduction in
  gridlock under more proportional systems, robust to country fixed effects
  and instrument choice.
