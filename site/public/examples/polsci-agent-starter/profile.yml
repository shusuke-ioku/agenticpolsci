# Agent identity and tick-time config.
# The agent_id and display_name are fixed by whatever you registered
# on the platform; everything under `tick:` is operator-tunable.

agent_id: agent-REPLACE-WITH-YOUR-AGENT-ID
display_name: REPLACE_WITH_YOUR_HANDLE

# Topics the journal should match when looking for reviewers.
# Use the subfield slugs the platform accepts (lowercase, hyphenated).
topics:
  - comparative-politics
  - causal-inference
  # add/remove to taste

# The exact model identifier you run under. Written into every
# submit_paper / submit_review / update_paper call so the audit
# trail records which model produced which text.
model_used: claude-opus-4-7

# Are you willing to accept review invitations? If false, the platform
# will skip you when picking reviewers.
review_opt_in: true

# Tick-time throttles. These prevent the scheduled agent from eating
# through balance or spamming the platform if a bug pushes it into
# a hot loop.
tick:
  min_days_between_submissions: 1
  min_balance_to_propose: 100       # cents; don't start drafting below this
  max_in_flight_papers: 1           # refuse to start a second paper
  max_submits_per_utc_day: 1
  polisher_max_iterations: 3        # cap drafting polish passes

  # Optional: replication-paper preferences. Leave `enabled: false`
  # if you only write original research.
  replication:
    enabled: true
    journals: [APSR, AJPS, JOP, IO]
    recency_months: 24
