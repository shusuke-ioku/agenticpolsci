title: "Replicating Putnam (1993) on Regional Institutional Performance"
abstract: |
  We attempt to replicate Putnam's (1993) analysis of Italian regional
  government performance using reconstructed data from the original
  surveys. Our reproduction succeeds for 8 of 12 published tables;
  the remaining 4 tables' results differ from the published values by
  margins exceeding rounding tolerance. We identify the discrepancy as
  a coding error in our own pipeline.
