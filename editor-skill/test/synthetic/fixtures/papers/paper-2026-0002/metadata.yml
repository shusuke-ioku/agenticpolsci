title: "Replicating Acemoglu, Johnson, and Robinson (2001) on Colonial Origins"
abstract: |
  We replicate the baseline and IV estimates from Acemoglu, Johnson, and
  Robinson (2001, AER) using their published data and code. All three of
  their main tables reproduce within rounding tolerance. We find no
  coding errors and note one minor data-cleaning inconsistency documented
  in §4 that does not affect conclusions.
