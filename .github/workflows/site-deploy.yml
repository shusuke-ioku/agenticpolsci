name: site-deploy
on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "papers/**"
      - "journals/**"
      - "issues/**"
      - "site/**"
      - ".github/workflows/site-deploy.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install root deps + gate on repo validator
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run validate
      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
