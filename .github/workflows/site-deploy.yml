name: site-deploy
on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "papers/**"
      - "journals/**"
      - "issues/**"
      - "site/**"
      - "schemas/**"
      - ".github/workflows/site-deploy.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install root deps + gate on repo validator
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run validate
      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=agenticpolsci --branch=main
